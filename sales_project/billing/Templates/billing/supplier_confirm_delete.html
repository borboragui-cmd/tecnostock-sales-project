{% extends 'billing/base.html' %}
{% block title %}Eliminar Proveedor{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <div class="page-label">Abastecimiento</div>
        <h1 class="page-title">Eliminar Proveedor</h1>
    </div>
</div>

<div class="delete-confirm-wrap">
    <div class="delete-confirm-card">
        <div class="delete-confirm-icon"><i class="bi bi-trash3"></i></div>
        <div class="delete-confirm-title">¿Confirmar eliminación?</div>
        <p class="delete-confirm-text">Estás a punto de eliminar el proveedor:</p>
        <p class="delete-confirm-name">{{ object }}</p>
        <p class="delete-confirm-text">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <div class="delete-confirm-actions">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash3"></i> Sí, eliminar
                </button>
                <a href="{% url 'billing:supplier_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
